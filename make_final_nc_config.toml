# Make Final NC Files Configuration
# Run: python make_final_nc_files.py

# ============================================================
[make_final_nc_files]
# ============================================================
float_num     = "FLOAT_NUM" 
nc_filepath   = 'PATH'
dest_filepath = 'PATH'

# Per-float ARGO metadata config (generated by make_config_file())
argo_config_fp = 'PATH TO CONFIG FILE'

# Path to original real-time ARGO netCDF files, or "" to skip
orgargo_netcdf_filepath = ""

# Set to true once when setting up a new float, then back to false for normal processing
# Please pass in orgargo_netcdf_filepath if present to parse parameters in config file
run_make_config_file      = false
config_file_dest_filepath = 'PATH'

[make_final_nc_files.psal_offset]
# PSAL correction offset applied to PSAL_ADJUSTED before writing
apply = true
value = 0.025

[make_final_nc_files.sci_calib]
# Scientific calibration strings written to SCIENTIFIC_CALIB_* in output netCDF.
# PRES strings are always set automatically from the surface pressure offset.
# Set any variable to "" to omit it from the output.
psal_coefficient = "PSAL_OFFSET=+0.025 PSU"
psal_comment     = "Comparison with several floats and independent CTDs show constant offset. Due to the lack of large temperature gradients and increased noise in salinity, standard RBR thermal inertia correction not applied"
psal_equation    = "PSAL_ADJUSTED = PSAL + 0.025"
temp_coefficient = ""
temp_comment     = ""
temp_equation    = ""
cndc_coefficient = ""
cndc_comment     = ""
cndc_equation    = ""
